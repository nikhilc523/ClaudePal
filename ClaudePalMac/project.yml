name: ClaudePalMac
options:
  bundleIdPrefix: com.claudepal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  ClaudePalMacCore:
    path: .

targets:
  ClaudePalMac:
    type: application
    platform: macOS
    sources:
      - path: ClaudePalMac
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
    dependencies:
      - package: ClaudePalMacCore
        product: ClaudePalMacCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudepal.mac
        INFOPLIST_FILE: ClaudePalMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudePalMac/ClaudePalMac.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        LS_UI_ELEMENT: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

