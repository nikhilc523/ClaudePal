name: ClaudePal
options:
  minimumXcodeGenVersion: 2.44.1
packages:
  ClaudePalKit:
    path: ClaudePalKit
targets:
  ClaudePal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ClaudePal/Sources
      - path: ClaudePal/Assets.xcassets
      - path: ClaudePal/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ClaudePalKit
        product: ClaudePalKit
      - target: ClaudePalWatch
        embed: true
      - target: ClaudePalWidgetExtension
        embed: true
    info:
      path: ClaudePal/Info.plist
      properties:
        UILaunchScreen: {}
        NSFaceIDUsageDescription: ClaudePal uses Face ID to authenticate destructive action approvals.
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikhilchowdary.ClaudePal
        SWIFT_VERSION: 6.0
        INFOPLIST_FILE: ClaudePal/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        GENERATE_INFOPLIST_FILE: NO
  ClaudePalWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ClaudePalWidgetExtension/Sources
    dependencies:
      - package: ClaudePalKit
        product: ClaudePalKit
    info:
      path: ClaudePalWidgetExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikhilchowdary.ClaudePal.WidgetExtension
        SWIFT_VERSION: 6.0
        INFOPLIST_FILE: ClaudePalWidgetExtension/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        GENERATE_INFOPLIST_FILE: NO
  ClaudePalWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ClaudePalWatch/Sources
    dependencies:
      - target: ClaudePalWatchWidgetExtension
    info:
      path: ClaudePalWatch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.nikhilchowdary.ClaudePal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikhilchowdary.ClaudePal.watchkitapp
        SWIFT_VERSION: 6.0
        INFOPLIST_FILE: ClaudePalWatch/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: NO
    scheme: {}
  ClaudePalWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: ClaudePalWatchWidgetExtension/Sources
    info:
      path: ClaudePalWatchWidgetExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikhilchowdary.ClaudePal.watchkitapp.widget
        SWIFT_VERSION: 6.0
        INFOPLIST_FILE: ClaudePalWatchWidgetExtension/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "4"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
